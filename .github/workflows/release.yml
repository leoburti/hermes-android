name: GitHub APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-github-apk:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/signing/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode release keystore
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/signing"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_FILE"
          test -f "$ANDROID_KEYSTORE_FILE" || { echo "Keystore file was not created"; exit 1; }
          echo "Keystore file size: $(wc -c < "$ANDROID_KEYSTORE_FILE") bytes"

      - name: Read Android release version
        id: release_version
        shell: bash
        run: |
          chmod +x ./gradlew
          version_name="$(./gradlew -q :app:printReleaseVersionName)"
          test -n "$version_name" || { echo "Gradle returned an empty versionName"; exit 1; }
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version_name" >> "$GITHUB_OUTPUT"
          echo "Android versionName: $version_name"

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          expected_tag="${{ steps.release_version.outputs.tag_name }}"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match Android versionName ${{ steps.release_version.outputs.version_name }}."
            echo "Update app/build.gradle.kts or push tag $expected_tag."
            exit 1
          fi

      - name: Build and stage signed GitHub APK
        shell: bash
        run: |
          ./gradlew test :app:stageGithubReleaseApk --no-daemon
          find build/release -maxdepth 1 -type f -name '*.apk' -print

      - name: Upload signed GitHub APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: hermes-webui-v${{ steps.release_version.outputs.version_name }}-github-apk
          path: build/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub release APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_version.outputs.tag_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA"
            gh release upload "$RELEASE_TAG" build/release/*.apk --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" build/release/*.apk \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Hermes WebUI Android $RELEASE_TAG" \
              --generate-notes
          fi

