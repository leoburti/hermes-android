name: Signed release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/signing/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode release keystore
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/signing"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_FILE"
          test -f "$ANDROID_KEYSTORE_FILE" || { echo "Keystore file was not created"; exit 1; }
          ls -lh "$ANDROID_KEYSTORE_FILE"
          echo "Keystore file size: $(wc -c < "$ANDROID_KEYSTORE_FILE") bytes"

      - name: Build and stage signed release artifacts
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew test :app:stageReleaseArtifacts --no-daemon

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts
          path: |
            build/release/*.apk
            build/release/*.aab
          if-no-files-found: error

      - name: Detect Google Play credentials
        id: play_credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Google Play (internal track)
        if: startsWith(github.ref, 'refs/tags/v') && steps.play_credentials.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonBase64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          packageName: com.hermeswebui.android
          releaseFiles: 'build/release/*.aab'
          track: internal
          inAppUpdatePriority: 5

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/*.apk
            build/release/*.aab
          generate_release_notes: true

